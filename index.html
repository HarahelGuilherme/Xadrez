<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xadrez Pro - Stockfish</title>
    
    <!-- CSS do Tabuleiro -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="game-container">
        <h1>Xadrez Profissional</h1>
        
        <div id="status-bar">
            <span id="status">Iniciando motor de jogo...</span>
        </div>

        <div id="myBoard"></div>

        <div class="panel">
            <div class="control-group">
                <label>Dificuldade:</label>
                <select id="depth-level">
                    <option value="8">Iniciante</option>
                    <option value="12" selected>Intermediário</option>
                    <option value="15">Mestre</option>
                </select>
            </div>
            <button id="resetBtn">Reiniciar Partida</button>
        </div>
    </div>

    <!-- BIBLIOTECAS (Ordem crítica para funcionamento) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Versão estável do Chess.js para evitar erro de "export" -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.2/chess.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    
    <script src="js/main.js"></script>
</body>
</html>
