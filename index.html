<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Master Pro - IA Stockfish</title>
    
    <!-- CSS do Tabuleiro (Chessboard.js) -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <!-- Nosso Estilo Personalizado -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="game-container">
        <h2>Xadrez Profissional</h2>
        
        <div id="status-container">
            <span id="status">Brancas jogam</span>
        </div>

        <div id="myBoard"></div>

        <div class="controls">
            <button onclick="location.reload()">Nova Partida</button>
            <div class="difficulty-container">
                <label>Nível da IA:</label>
                <select id="depth-level">
                    <option value="8">Iniciante</option>
                    <option value="12" selected>Intermediário</option>
                    <option value="15">Mestre (Lento)</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Bibliotecas Necessárias -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    
    <!-- Lógica do Jogo -->
    <script src="js/main.js"></script>
</body>
</html>
